<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Dynamic title/meta filled by script.js -->
    <title>My Links</title>
    <meta name="description" content="My links page" />

    <!-- Tailwind CSS via CDN (Play CDN — zero build step) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome 6 (icons) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Page styles -->
    <link rel="stylesheet" href="style.css" />

    <!-- Tailwind custom config (extend only) -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            maxWidth: { link: "28rem" }
          }
        }
      };
    </script>
  </head>

  <body>
    <!-- Full-page background (colour/gradient set by script.js) -->
    <div id="page-bg">

      <!-- Centred single-column layout -->
      <div class="page-container">

        <!-- ── PROFILE ─────────────────────── -->
        <section id="profile-section" class="profile-section">

          <!-- Avatar -->
          <div class="mb-4">
            <img
              id="avatar-img"
              src=""
              alt="Profile avatar"
              class="skeleton"
            />
            <div id="avatar-placeholder" class="avatar-placeholder skeleton"></div>
          </div>

          <!-- Username -->
          <h1 id="username" class="skeleton w-40 h-7 rounded"></h1>

          <!-- Bio -->
          <p id="bio" class="skeleton w-56 h-4 rounded mt-1"></p>

        </section>

        <!-- ── LINKS ──────────────────────── -->
        <section id="links-section" class="links-section">
          <!-- Buttons injected by script.js -->
        </section>

        <!-- ── VIDEO EMBEDS ──────────────── -->
        <section id="video-section" class="video-section" style="display:none">

          <h2 id="video-heading" class="video-heading">Watch / Stream</h2>

          <!-- YouTube latest upload -->
          <div id="youtube-container" style="display:none">
            <p class="embed-label">
              <i class="fa-brands fa-youtube"></i> Latest Video
            </p>
            <div class="video-wrapper">
              <iframe
                id="youtube-iframe"
                src=""
                title="YouTube Latest Video"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen
              ></iframe>
            </div>
          </div>

          <!-- Twitch live player -->
          <div id="twitch-container" style="display:none">
            <p class="embed-label">
              <i class="fa-brands fa-twitch"></i> Live Stream
            </p>
            <div class="video-wrapper">
              <iframe
                id="twitch-iframe"
                src=""
                title="Twitch Stream"
                allowfullscreen
              ></iframe>
            </div>
          </div>

        </section>

        <!-- ── FOOTER ─────────────────────── -->
        <footer class="page-footer">Powered by your own link page</footer>

      </div>
    </div>

    <!-- Main rendering logic -->
    <script src="script.js"></script>
  </body>
</html>
